# ============================
# Egress STREAM (TCP Forward)
# ============================

stream {

    # DNS resolver for upstream hostnames (resolved only at startup)
    resolver 9.9.9.9 8.8.8.8 ipv6=off;

    # Logging format for TCP proxying
    log_format stream_main
        '$remote_addr [$time_local] '
        'protocol=$protocol '
        'status=$status '
        'bytes_sent=$bytes_sent bytes_received=$bytes_received '
        'session_time=$session_time '
        'upstream_addr=$upstream_addr '
        'upstream_bytes_sent=$upstream_bytes_sent upstream_bytes_received=$upstream_bytes_received';

    access_log /var/log/nginx/stream_access.log stream_main buffer=16k flush=5s;
    error_log  /var/log/nginx/stream_error.log warn;

    # Connection timeouts
    proxy_connect_timeout 10s;
    proxy_timeout 60s;

    # Include user-defined stream rules
    include /etc/nginx/conf-enabled/egress/stream.d/*.conf;
}
