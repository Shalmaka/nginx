server {
    listen 465;
    protocol smtp;

    # TLS termination (if needed)
    ssl_prefer_server_ciphers on;
    ssl_protocols TLSv1.2 TLSv1.3;

    ssl_certificate     /usr/share/nginx/certs/smtp.crt;
    ssl_certificate_key /usr/share/nginx/certs/smtp.key;

    proxy_pass smtp.internal.local:465;
}
