# ============================
# Egress SMTP (Mail Proxy)
# Modular configuration
# ============================

mail {

    # DNS resolver for upstream hostnames
    resolver 9.9.9.9 8.8.8.8 ipv6=off;

    # Disable built-in auth unless overridden by sub-configs
    smtp_auth none;

    # Optional: advertise STARTTLS capability
    smtp_capabilities "SIZE 10485760" "STARTTLS";

    # Logging
    error_log /var/log/nginx/mail_error.log warn;

    # Include modular SMTP configs
    include /etc/nginx/conf-enabled/egress/mail.d/mail-*.conf;
}
